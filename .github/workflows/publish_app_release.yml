name: Manual-Android-Debug-Build

# 改为手动触发
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0-debug'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4

      # 2. 设置 JAVA 环境
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      # 3. 设置 Flutter 环境
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true

      # 4. 更新 Flutter 依赖
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 5. 打包 APK
      # 请确保 app/build.gradle 已改为使用 signingConfigs.debug
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      # 6. 发布到 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # 使用手动输入的版本号
          name: "Manual Build ${{ github.event.inputs.version_name }}"
          tag_name: ${{ github.event.inputs.version_name }}
          generate_release_notes: true
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      # 7. 同时上传到 Artifacts (方便直接从 Action 页面下载)
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk

      - run: echo "🍏 Build finished for ${{ github.event.inputs.version_name }}."
